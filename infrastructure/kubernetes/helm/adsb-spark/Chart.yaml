apiVersion: v2
name: adsb-spark
description: >-
  Spark standalone cluster (1 master + N workers + an idle driver pod for
  client-mode submits) with a RustFS S3-compatible object store, for local
  development and testing of the spark-adsb analytics layer. Helm equivalent of
  the Kustomize base/ + overlays/ in this directory.
type: application
# Chart version — bump on chart changes.
version: 0.1.0
# Default Spark version deployed (pipeline-compatible). Override with the
# values-4.2.0.yaml preset for experimentation.
appVersion: "4.1.1"
