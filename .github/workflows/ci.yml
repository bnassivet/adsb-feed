name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-core:
    name: Rust core (adsb-pulsar-client + adsb-data-engine)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            pkg-config \
            build-essential \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-core-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-core-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy -p adsb-pulsar-client -p adsb-data-engine -- -D warnings

      - name: Run tests
        run: cargo test -p adsb-pulsar-client -p adsb-data-engine

  rust-desktop:
    name: Rust desktop (adsb-pulsar-client-desktop / Tauri)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    env:
      CARGO_TARGET_DIR: $RUNNER_TEMP/cargo-target

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Tauri + protoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            pkg-config \
            build-essential \
            curl wget file libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-desktop-

      - name: Clippy
        run: cargo clippy -p adsb-pulsar-client-desktop -- -D warnings

      - name: Run tests
        run: cargo test -p adsb-pulsar-client-desktop

  typescript:
    name: TypeScript (test, lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/adsb-pulsar-client-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: rust/adsb-pulsar-client-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx next lint

      - name: Run tests
        run: npm test
