  python-agent:
    name: Python agent (test, lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/adsb-agent

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: rust/adsb-agent/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: rust/adsb-agent/.python-version

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run tests
        run: uv run pytest
        env:
          OPENAI_API_KEY: test-key
          OPENAI_BASE_URL: http://localhost:1234/v1

  typescript:
    name: TypeScript (test, lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust/adsb-pulsar-client-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: rust/adsb-pulsar-client-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build (static export)
        run: npm run build
