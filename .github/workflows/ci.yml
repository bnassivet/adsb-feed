name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  rust-core:
    name: Rust core (adsb-pulsar-client + adsb-data-engine)
    runs-on: ubuntu-latest
    env:
      # DuckDB's `bundled` feature compiles the full C++ amalgamation; debug
      # info inflates the object files and libduckdb.a enough to exhaust the
      # runner's disk. CI does not need debuggable binaries.
      CARGO_PROFILE_DEV_DEBUG: "0"
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            protobuf-compiler \
            pkg-config \
            build-essential \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry and git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-core-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-core-

      - name: Cache Cargo target (core)
        uses: actions/cache@v4
        with:
          path: rust/target
          key: ${{ runner.os }}-cargo-core-target-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-core-target-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy -p adsb-pulsar-client -p adsb-data-engine -- -D warnings

      - name: Run tests
        run: cargo test -p adsb-pulsar-client -p adsb-data-engine

